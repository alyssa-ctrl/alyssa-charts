<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Real Estate ROI Test Chart</title>
  <style>
    body { margin: 0; background: #0f172a; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: #1e293b; border-radius: 16px; padding: 40px; width: 1100px; color: #f1f5f9; }
    h1 { font-size: 28px; margin: 0 0 8px; color: #38bdf8; }
    p { margin: 0 0 32px; color: #94a3b8; font-size: 15px; }
    .bars { display: flex; align-items: flex-end; gap: 20px; height: 300px; }
    .bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
    .bar { width: 100%; border-radius: 8px 8px 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 10px; font-weight: 700; font-size: 18px; color: #fff; }
    .label { margin-top: 10px; font-size: 13px; color: #94a3b8; text-align: center; }
    .legend { margin-top: 24px; font-size: 13px; color: #64748b; text-align: right; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI-Enhanced Real Estate vs. Traditional — 5-Year ROI</h1>
    <p>Properties leveraging AI pricing &amp; tenant screening outperform traditional by 2.3×</p>
    <div class="bars">
      <div class="bar-wrap">
        <div class="bar" style="height:42%;background:#334155;">18%</div>
        <div class="label">Traditional<br>Single-Family</div>
      </div>
      <div class="bar-wrap">
        <div class="bar" style="height:60%;background:#0369a1;">27%</div>
        <div class="label">Traditional<br>Multi-Family</div>
      </div>
      <div class="bar-wrap">
        <div class="bar" style="height:85%;background:#0284c7;">38%</div>
        <div class="label">AI-Optimized<br>Single-Family</div>
      </div>
      <div class="bar-wrap">
        <div class="bar" style="height:100%;background:#38bdf8;">45%</div>
        <div class="label">AI-Optimized<br>Multi-Family</div>
      </div>
    </div>
    <div class="legend">5-year cumulative ROI · AlyssaClarkRE.com</div>
  </div>
</body>
</html>
