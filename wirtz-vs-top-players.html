<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Florian Wirtz vs Top Players 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1200px; height: 675px; overflow: hidden; background: #ffffff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; padding: 48px 56px 36px; }
.top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 36px; }
.eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #b0b0b0; margin-bottom: 8px; }
h1 { font-size: 28px; font-weight: 700; color: #111; line-height: 1.2; }
h1 span { color: #11738b; }
.season { font-size: 13px; color: #999; font-weight: 400; margin-top: 4px; }
.legend { display: flex; align-items: center; gap: 24px; }
.leg { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; font-weight: 500; }
.leg-line { width: 24px; height: 3px; border-radius: 2px; }
.chart { flex: 1; position: relative; }
canvas { width: 100% !important; }
.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
.source { font-size: 10px; color: #ccc; }
.handle { font-size: 11px; color: #11738b; font-weight: 600; }
</style>
</head>
<body>
<div class="top">
  <div>
    <div class="eyebrow">Player comparison · 2025/26 season</div>
    <h1>Is <span>Florian Wirtz</span> the best<br>player in the world right now?</h1>
    <div class="season">Key stats per 90 min — top 6 attackers compared</div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-line" style="background:#11738b;height:4px"></div>Wirtz</div>
    <div class="leg"><div class="leg-line" style="background:#d4d4d4;height:4px"></div>Others</div>
  </div>
</div>
<div class="chart" style="flex:1;position:relative;">
  <div style="position:relative;width:100%;height:460px;"><canvas id="chart"></canvas></div>
</div>
<div class="footer">
  <div class="source">Sources: FBref · Opta · Transfermarkt · UEFA 2025/26</div>
  <div class="handle">@AlyssaClarkRE</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const players = ['Wirtz','Bellingham','Vinicius Jr','Mbappe','Saka','Pedri'];
const cats = ['Goals p90','Assists p90','Key passes p90','Dribbles p90','Chances created p90'];
const data = [[0.72,0.58,0.61,0.65,0.52,0.38],[0.61,0.44,0.38,0.31,0.48,0.42],[3.8,2.9,2.6,2.4,3.1,3.4],[3.2,2.1,4.1,2.8,3.6,2.4],[4.9,3.6,3.2,3.0,3.8,4.1]];
new Chart(document.getElementById('chart'),{
  type:'bar',
  data:{
    labels:cats,
    datasets:players.map((p,pi)=>({
      label:p,
      data:data.map(d=>d[pi]),
      backgroundColor:pi===0?'rgba(17,115,139,0.9)':'rgba(220,220,220,0.6)',
      borderColor:pi===0?'#11738b':'#d4d4d4',
      borderWidth:pi===0?1:0,
      borderRadius:3,
      borderSkipped:false
    }))
  },
  options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:'#111',padding:10,callbacks:{title:ctx=>ctx[0].dataset.label,label:ctx=>` ${cats[ctx.dataIndex]}: ${ctx.parsed.y}`}}
    },
    scales:{
      x:{ticks:{color:'#999',font:{size:12,family:'Inter',weight:'500'}},grid:{display:false},border:{display:false}},
      y:{ticks:{color:'#ccc',font:{size:11,family:'Inter'},maxTicksLimit:5},grid:{color:'rgba(0,0,0,0.05)'},border:{display:false}}
    }
  }
});
</script>
</body>
</html>
