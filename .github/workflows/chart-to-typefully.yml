name: Chart to Typefully

on:
  push:
    paths:
      - '**.html'

permissions:
  contents: write

jobs:
  screenshot-and-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Node dependencies
        run: npm install puppeteer-core

      - name: Run screenshot and upload
        env:
          TYPEFULLY_API_KEY: ${{ secrets.TYPEFULLY_API_KEY }}
          GITHUB_PAGES_BASE: "https://alyssa-ctrl.github.io/alyssa-charts"
          TYPEFULLY_SOCIAL_SET_ID: ${{ secrets.TYPEFULLY_SOCIAL_SET_ID }}
          PUPPETEER_EXECUTABLE_PATH: "/usr/bin/google-chrome-stable"
        run: node .github/scripts/screenshot-and-upload.js

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart-manifest.json
          git diff --staged --quiet || git commit -m "Update chart manifest [skip ci]"
          git push
